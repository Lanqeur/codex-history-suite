name: ci

on:
  push:
  pull_request:

jobs:
  portable-core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install .[dev]
      - run: python -m pytest
      - run: python scripts/codex_history.py --home ${{ runner.temp }}/codex-history-doctor doctor --json

  semantic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install .[semantic]
      - run: python tests/semantic_smoke.py

